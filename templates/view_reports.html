<!DOCTYPE html>
<html>
<head>
    <title>Theft Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>All Theft Reports</h2>

<table border="1">
    <tr>
        <th>Student ID</th>
        <th>Room ID</th>
        <th>Description</th>
        <th>Status</th>
        <th>Reported On</th>
    </tr>

    {% for report in reports %}
    <tr>
        <td>{{ report.student_id }}</td>
        <td>{{ report.room_id }}</td>
        <td>{{ report.description }}</td>
        <td>{{ report.status }}</td>
        <td>{{ report.reported_on }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/admin-dashboard">Back to Dashboard</a>

</body>
</html>
